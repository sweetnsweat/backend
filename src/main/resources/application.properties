spring.application.name=backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.mvc.problemdetails.enabled=true

logging.file.name=${LOG_FILE:logs/backend.log}
app.api-request-logging.enabled=${API_REQUEST_LOGGING_ENABLED:true}
app.dev.logs.enabled=${DEV_LOGS_ENABLED:true}
app.dev.logs.max-lines=${DEV_LOGS_MAX_LINES:500}

app.ai.base-url=${AI_BASE_URL:http://localhost:8000}
app.media.base-url=${MEDIA_BASE_URL:${AI_BASE_URL:http://localhost:8000}}

spring.mail.host=${MAIL_HOST:smtp.naver.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.mail.from-name=${MAIL_FROM_NAME:sweet & sweat}

app.firebase.enabled=${FIREBASE_ENABLED:false}
app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
app.firebase.project-id=${FIREBASE_PROJECT_ID:}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

app.jwt.issuer=${JWT_ISSUER:capstone-backend}
app.jwt.secret=${JWT_SECRET:change-me-to-a-32-char-or-longer-secret-key}
app.jwt.access-token-seconds=${JWT_ACCESS_TOKEN_SECONDS:3600}
app.jwt.refresh-token-seconds=${JWT_REFRESH_TOKEN_SECONDS:1209600}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,http://100.89.171.113:3000,http://100.89.171.113:5173}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age-seconds=${CORS_MAX_AGE_SECONDS:3600}

management.endpoints.web.exposure.include=health,info,logfile

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.urls[0].name=springdoc-generated
springdoc.swagger-ui.urls[0].url=/v3/api-docs.yaml
springdoc.swagger-ui.urls[1].name=midterm-contract-yaml
springdoc.swagger-ui.urls[1].url=/openapi.yaml
springdoc.swagger-ui.urls-primary-name=springdoc-generated

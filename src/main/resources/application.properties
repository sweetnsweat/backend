spring.application.name=backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.urls[0].name=springdoc-generated
springdoc.swagger-ui.urls[0].url=/v3/api-docs.yaml
springdoc.swagger-ui.urls[1].name=midterm-contract-yaml
springdoc.swagger-ui.urls[1].url=/openapi.yaml
springdoc.swagger-ui.urls-primary-name=midterm-contract-yaml

openapi: 3.1.0
info:
  title: Sweet & Sweat Backend API
  version: v0.1.0
  description: API contract for endpoints currently implemented by the backend.
servers:
  - url: http://100.89.171.113:8080
    description: Tailscale development server
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Health
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Check backend API health
      security: []
      responses:
        "200":
          description: Backend API is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseHealthResponse"
components:
  schemas:
    ApiResponseHealthResponse:
      type: object
      required:
        - success
        - code
        - message
        - timestamp
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: OK
        message:
          type: string
          example: Request succeeded
        timestamp:
          type: string
          format: date-time
        data:
          $ref: "#/components/schemas/HealthResponse"
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          example: UP
        timestamp:
          type: string
          format: date-time

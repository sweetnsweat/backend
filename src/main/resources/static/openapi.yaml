openapi: 3.1.0
info:
  title: Sweet & Sweat Backend API
  version: v0.1.0
  description: API contract for the midterm demo flow.
servers:
  - url: http://100.89.171.113:8080
    description: Tailscale development server
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Auth
  - name: Users
  - name: Routines
  - name: Conditions
  - name: Quests
  - name: Stories
  - name: Health
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Check backend API health
      security: []
      responses:
        "200":
          description: Backend API is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseHealthResponse"

  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Create a demo user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserProfileResponse"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and issue JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseLoginResponse"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke active refresh tokens
      responses:
        "200":
          description: Logout completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"

  /api/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"

  /api/users/me/exercise-profile:
    put:
      tags: [Users]
      summary: Save current user's exercise experience and preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExerciseProfileRequest"
      responses:
        "200":
          description: Exercise profile saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"

  /api/users/me/summary:
    get:
      tags: [Users]
      summary: Get current user's demo summary
      responses:
        "200":
          description: User condition, quest, wallet, and story summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummaryResponse"

  /api/routines/default:
    get:
      tags: [Routines]
      summary: List default workout routines
      responses:
        "200":
          description: Default routines.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoutineSummary"

  /api/routines/{routineId}:
    get:
      tags: [Routines]
      summary: Get routine detail
      parameters:
        - $ref: "#/components/parameters/RoutineId"
      responses:
        "200":
          description: Routine detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineDetail"

  /api/users/me/routines/active:
    get:
      tags: [Routines]
      summary: Get current user's active routine
      responses:
        "200":
          description: Active routine for quest generation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineDetail"

  /api/conditions/today:
    get:
      tags: [Conditions]
      summary: Get today's condition log
      responses:
        "200":
          description: Today's condition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConditionResponse"
    put:
      tags: [Conditions]
      summary: Save today's condition log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConditionRequest"
      responses:
        "200":
          description: Today's condition saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConditionResponse"

  /api/quests/today:
    get:
      tags: [Quests]
      summary: List today's quests
      responses:
        "200":
          description: Today's quests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestResponse"

  /api/quests/today/generate:
    post:
      tags: [Quests]
      summary: Generate today's quests from condition and active routine
      responses:
        "200":
          description: Existing or newly generated quests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestResponse"

  /api/quests/{questId}/progress:
    patch:
      tags: [Quests]
      summary: Update quest progress
      parameters:
        - $ref: "#/components/parameters/QuestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestProgressRequest"
      responses:
        "200":
          description: Quest progress updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestResponse"

  /api/quests/{questId}/complete:
    post:
      tags: [Quests]
      summary: Complete a quest and grant rewards
      parameters:
        - $ref: "#/components/parameters/QuestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestCompleteRequest"
      responses:
        "200":
          description: Quest completion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestCompleteResponse"

  /api/stories/progress:
    get:
      tags: [Stories]
      summary: Get current story progress
      responses:
        "200":
          description: Story progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryProgressResponse"

  /api/stories/start:
    post:
      tags: [Stories]
      summary: Start or continue the default story
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryStartRequest"
      responses:
        "200":
          description: Story session started or restored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorySceneResponse"

  /api/stories/play:
    post:
      tags: [Stories]
      summary: Process a story input or branch option
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryPlayRequest"
      responses:
        "200":
          description: Next story scene.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorySceneResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RoutineId:
      name: routineId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    QuestId:
      name: questId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ApiResponseMeta:
      type: object
      required: [success, code, message, timestamp]
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: OK
        message:
          type: string
          example: Request succeeded
        timestamp:
          type: string
          format: date-time

    ApiResponseHealthResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/HealthResponse"

    ApiResponseUserProfileResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserProfileResponse"

    ApiResponseLoginResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginResponse"

    ApiResponseVoid:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          properties:
            data:
              nullable: true

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          example: UP
        timestamp:
          type: string
          format: date-time

    SignupRequest:
      type: object
      required: [loginId, password, nickname]
      properties:
        loginId:
          type: string
          example: demo
        password:
          type: string
          format: password
          example: demo1234
        nickname:
          type: string
          example: Demo User

    LoginRequest:
      type: object
      required: [loginId, password]
      properties:
        loginId:
          type: string
          example: demo
        password:
          type: string
          format: password
          example: demo1234

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, tokenType, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: "#/components/schemas/UserProfileResponse"

    ExerciseProfileRequest:
      type: object
      required: [exerciseExperience, preferredExercise]
      properties:
        exerciseExperience:
          type: string
          enum: [beginner, intermediate, advanced]
          example: beginner
        preferredExercise:
          type: string
          example: strength

    UserProfileResponse:
      type: object
      required: [id, loginId, nickname]
      properties:
        id:
          type: integer
          format: int64
        loginId:
          type: string
        nickname:
          type: string
        exerciseExperience:
          type: string
          nullable: true
        preferredExercise:
          type: string
          nullable: true

    UserSummaryResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfileResponse"
        condition:
          $ref: "#/components/schemas/ConditionResponse"
        quests:
          type: array
          items:
            $ref: "#/components/schemas/QuestResponse"
        story:
          $ref: "#/components/schemas/StoryProgressResponse"
        wallet:
          $ref: "#/components/schemas/WalletResponse"

    RoutineSummary:
      type: object
      required: [id, name, difficulty, estimatedMinutes]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: Beginner Full Body
        difficulty:
          type: string
          example: beginner
        estimatedMinutes:
          type: integer
          example: 30

    RoutineDetail:
      allOf:
        - $ref: "#/components/schemas/RoutineSummary"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/RoutineItem"

    RoutineItem:
      type: object
      properties:
        exerciseName:
          type: string
          example: Squat
        sets:
          type: integer
          example: 3
        reps:
          type: integer
          example: 12
        durationSeconds:
          type: integer
          nullable: true

    ConditionRequest:
      type: object
      required: [sleepScore, stressScore, fatigueScore]
      properties:
        sleepScore:
          type: integer
          minimum: 1
          maximum: 5
        stressScore:
          type: integer
          minimum: 1
          maximum: 5
        fatigueScore:
          type: integer
          minimum: 1
          maximum: 5

    ConditionResponse:
      type: object
      properties:
        logDate:
          type: string
          format: date
        sleepScore:
          type: integer
        stressScore:
          type: integer
        fatigueScore:
          type: integer
        conditionScore:
          type: number
          format: double
        exerciseMultiplier:
          type: number
          format: double
          example: 1.0

    QuestResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        questDate:
          type: string
          format: date
        targetValue:
          type: integer
        progressValue:
          type: integer
        status:
          type: string
          enum: [created, in_progress, completed]
        verificationStatus:
          type: string
          enum: [none, pending, passed, failed]
        scenarioId:
          type: integer
          format: int64
          nullable: true
        branchChoiceId:
          type: integer
          format: int64
          nullable: true
        questContext:
          type: object
          additionalProperties: true
          nullable: true

    QuestProgressRequest:
      type: object
      required: [progressValue]
      properties:
        progressValue:
          type: integer
          minimum: 0
        proof:
          type: object
          additionalProperties: true

    QuestCompleteRequest:
      type: object
      properties:
        proof:
          type: object
          additionalProperties: true

    QuestCompleteResponse:
      type: object
      properties:
        quest:
          $ref: "#/components/schemas/QuestResponse"
        reward:
          $ref: "#/components/schemas/RewardResponse"

    RewardResponse:
      type: object
      properties:
        coinAmount:
          type: integer
          example: 100
        walletBalance:
          type: integer
          example: 500

    WalletResponse:
      type: object
      properties:
        balance:
          type: integer
          example: 500

    StoryStartRequest:
      type: object
      properties:
        worldId:
          type: integer
          format: int64
          nullable: true

    StoryPlayRequest:
      type: object
      required: [inputText]
      properties:
        worldId:
          type: integer
          format: int64
          nullable: true
        inputText:
          type: string
          example: "1"

    StorySceneResponse:
      type: object
      properties:
        worldId:
          type: integer
          format: int64
        scenarioId:
          type: integer
          format: int64
        dayNumber:
          type: integer
        compiledText:
          type: string
        updatedSceneSummary:
          type: string
        branchReady:
          type: boolean
        eventApplied:
          type: boolean
        dayComplete:
          type: boolean
        branchOptions:
          type: array
          items:
            $ref: "#/components/schemas/BranchOption"
        linkedQuest:
          $ref: "#/components/schemas/QuestResponse"

    StoryProgressResponse:
      type: object
      properties:
        worldId:
          type: integer
          format: int64
        currentScenarioId:
          type: integer
          format: int64
        currentDay:
          type: integer
        completedDay:
          type: integer
        unlockedDay:
          type: integer
        lastSceneSummary:
          type: string
        status:
          type: string
          enum: [active, paused, completed]

    BranchOption:
      type: object
      properties:
        optionNumber:
          type: integer
        optionText:
          type: string
